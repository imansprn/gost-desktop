name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            task: :composeApp:packageDmg
            artifact_glob: composeApp/build/compose/binaries/main/dmg/*.dmg
            artifact_name: macos-intel
          - os: macos-14
            task: :composeApp:packageDmg
            artifact_glob: composeApp/build/compose/binaries/main/dmg/*.dmg
            artifact_name: macos-arm64
          - os: windows-latest
            task: :composeApp:packageMsi
            artifact_glob: composeApp/build/compose/binaries/main/msi/*.msi
            artifact_name: windows
          - os: ubuntu-latest
            task: :composeApp:packageDeb
            artifact_glob: composeApp/build/compose/binaries/main/deb/*.deb
            artifact_name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION_RAW="${TAG#v}"
          IFS='.' read -r V1 V2 V3 EXTRA <<< "$VERSION_RAW"
          V1="${V1:-0}"
          V2="${V2:-0}"
          V3="${V3:-0}"
          VERSION_3="${V1}.${V2}.${V3}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION_3" >> "$GITHUB_OUTPUT"

      # Use bash on all OSes: PowerShell splits -PappVersion=2.0.4 into -PappVersion=2 and task ".0.4".
      - name: Build distribution
        shell: bash
        run: ./gradlew ${{ matrix.task }} "-PappVersion=${{ steps.ver.outputs.version }}" --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  build-macos-universal:
    name: Build macOS Universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (ARM64)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build ARM64
        run: ./gradlew :composeApp:createDistributable

      - name: Store ARM64 App
        run: |
          mkdir -p build/arch/arm64
          cp -R composeApp/build/compose/binaries/main/app/*.app build/arch/arm64/

      - name: Set up JDK 21 (x64)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          architecture: x64

      - name: Build x64
        run: ./gradlew :composeApp:createDistributable

      - name: Store x64 App
        run: |
          mkdir -p build/arch/x64
          cp -R composeApp/build/compose/binaries/main/app/*.app build/arch/x64/

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION_RAW="${TAG#v}"
          IFS='.' read -r V1 V2 V3 EXTRA <<< "$VERSION_RAW"
          V1="${V1:-0}"
          V2="${V2:-0}"
          V3="${V3:-0}"
          VERSION_3="${V1}.${V2}.${V3}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION_3" >> "$GITHUB_OUTPUT"

      - name: Create Universal Binary
        run: |
          mkdir -p build/arch/universal
          cp -R build/arch/arm64/*.app build/arch/universal/
          APP_PATH=$(find build/arch/universal -name "*.app" -maxdepth 1)
          APP_NAME=$(basename "$APP_PATH")
          EXE_NAME="${APP_NAME%.app}"
          lipo -create \
            build/arch/x64/"$APP_NAME"/Contents/MacOS/"$EXE_NAME" \
            build/arch/arm64/"$APP_NAME"/Contents/MacOS/"$EXE_NAME" \
            -output build/arch/universal/"$APP_NAME"/Contents/MacOS/"$EXE_NAME"
          
          # Verify
          lipo -info build/arch/universal/"$APP_NAME"/Contents/MacOS/"$EXE_NAME"

      - name: Create DMG
        run: |
          APP_PATH=$(find build/arch/universal -name "*.app" -maxdepth 1)
          APP_NAME=$(basename "$APP_PATH")
          DMG_NAME="GOST-Desktop-Universal-${{ steps.ver.outputs.version }}.dmg"
          hdiutil create -volname "$APP_NAME" -srcfolder build/arch/universal -ov -format UDZO "$DMG_NAME"
          echo "dmg_name=$DMG_NAME" >> $GITHUB_ENV

      - name: Upload Universal DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: ${{ env.dmg_name }}

  release:
    name: Publish GitHub Release
    needs: [build, build-macos-universal]
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION_RAW="${TAG#v}"
          IFS='.' read -r V1 V2 V3 EXTRA <<< "$VERSION_RAW"
          V1="${V1:-0}"
          V2="${V2:-0}"
          V3="${V3:-0}"
          VERSION_3="${V1}.${V2}.${V3}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION_3" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/**/*

