name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: macos
            is_universal: true
          - os: windows-latest
            task: :composeApp:packageMsi
            artifact_glob: composeApp/build/compose/binaries/main/msi/*.msi
            artifact_name: windows
          - os: ubuntu-latest
            task: :composeApp:packageDeb
            artifact_glob: composeApp/build/compose/binaries/main/deb/*.deb
            artifact_name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION_RAW="${TAG#v}"
          IFS='.' read -r V1 V2 V3 EXTRA <<< "$VERSION_RAW"
          V1="${V1:-0}"
          V2="${V2:-0}"
          V3="${V3:-0}"
          VERSION_3="${V1}.${V2}.${V3}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION_3" >> "$GITHUB_OUTPUT"

      # ── macOS (ARM64 + x64 → lipo) ──
      - name: Set up JDK 21 (ARM64)
        if: matrix.is_universal
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build ARM64
        if: matrix.is_universal
        run: ./gradlew clean :composeApp:createDistributable "-PappVersion=${{ steps.ver.outputs.version }}" --no-daemon

      - name: Verify and Store ARM64 App
        if: matrix.is_universal
        run: |
          mkdir -p build/arch/arm64
          cp -R composeApp/build/compose/binaries/main/app/*.app build/arch/arm64/
          APP_PATH=$(find build/arch/arm64 -name "*.app" -maxdepth 1)
          EXE_NAME=$(basename "$APP_PATH" .app)
          echo "Verifying ARM64 binary:"
          file "$APP_PATH/Contents/MacOS/$EXE_NAME"
          lipo -info "$APP_PATH/Contents/MacOS/$EXE_NAME"

      - name: Set up JDK 21 (x64)
        if: matrix.is_universal
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          architecture: x64

      - name: Build x64
        if: matrix.is_universal
        run: arch -x86_64 ./gradlew clean :composeApp:createDistributable "-PappVersion=${{ steps.ver.outputs.version }}" --no-daemon

      - name: Verify and Store x64 App
        if: matrix.is_universal
        run: |
          mkdir -p build/arch/x64
          cp -R composeApp/build/compose/binaries/main/app/*.app build/arch/x64/
          APP_PATH=$(find build/arch/x64 -name "*.app" -maxdepth 1)
          EXE_NAME=$(basename "$APP_PATH" .app)
          echo "Verifying x64 binary:"
          file "$APP_PATH/Contents/MacOS/$EXE_NAME"
          lipo -info "$APP_PATH/Contents/MacOS/$EXE_NAME"

      - name: Create Universal Binary
        if: matrix.is_universal
        run: |
          mkdir -p build/arch/universal
          cp -R build/arch/arm64/*.app build/arch/universal/
          APP_PATH=$(find build/arch/universal -name "*.app" -maxdepth 1)
          APP_NAME=$(basename "$APP_PATH")
          EXE_NAME="${APP_NAME%.app}"
          lipo -create \
            build/arch/x64/"$APP_NAME"/Contents/MacOS/"$EXE_NAME" \
            build/arch/arm64/"$APP_NAME"/Contents/MacOS/"$EXE_NAME" \
            -output build/arch/universal/"$APP_NAME"/Contents/MacOS/"$EXE_NAME"
          lipo -info build/arch/universal/"$APP_NAME"/Contents/MacOS/"$EXE_NAME"

      - name: Create DMG
        if: matrix.is_universal
        run: |
          APP_PATH=$(find build/arch/universal -name "*.app" -maxdepth 1)
          APP_NAME=$(basename "$APP_PATH")
          DMG_NAME="GOST-Desktop-${{ steps.ver.outputs.version }}-macOS.dmg"
          hdiutil create -volname "$APP_NAME" -srcfolder build/arch/universal -ov -format UDZO "$DMG_NAME"
          echo "dmg_name=$DMG_NAME" >> $GITHUB_ENV

      - name: Upload macOS
        if: matrix.is_universal
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: ${{ env.dmg_name }}

      # ── Windows / Linux (simple single-task build) ──
      - name: Set up JDK 21
        if: ${{ !matrix.is_universal }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build distribution
        if: ${{ !matrix.is_universal }}
        shell: bash
        run: ./gradlew ${{ matrix.task }} "-PappVersion=${{ steps.ver.outputs.version }}" --no-daemon

      - name: Upload artifact
        if: ${{ !matrix.is_universal }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION_RAW="${TAG#v}"
          IFS='.' read -r V1 V2 V3 EXTRA <<< "$VERSION_RAW"
          V1="${V1:-0}"
          V2="${V2:-0}"
          V3="${V3:-0}"
          VERSION_3="${V1}.${V2}.${V3}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION_3" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/**/*
