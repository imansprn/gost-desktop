name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            task: :composeApp:packageDmg
            artifact_glob: composeApp/build/compose/binaries/main/dmg/*.dmg
            artifact_name: macos-arm64
          - os: macos-13
            task: :composeApp:packageDmg
            artifact_glob: composeApp/build/compose/binaries/main/dmg/*.dmg
            artifact_name: macos-intel
          - os: windows-latest
            task: :composeApp:packageMsi
            artifact_glob: composeApp/build/compose/binaries/main/msi/*.msi
            artifact_name: windows
          - os: ubuntu-latest
            task: :composeApp:packageDeb
            artifact_glob: composeApp/build/compose/binaries/main/deb/*.deb
            artifact_name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION_RAW="${TAG#v}"
          IFS='.' read -r V1 V2 V3 EXTRA <<< "$VERSION_RAW"
          V1="${V1:-0}"
          V2="${V2:-0}"
          V3="${V3:-0}"
          VERSION_3="${V1}.${V2}.${V3}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION_3" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build distribution
        shell: bash
        run: ./gradlew ${{ matrix.task }} "-PappVersion=${{ steps.ver.outputs.version }}" --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION_RAW="${TAG#v}"
          IFS='.' read -r V1 V2 V3 EXTRA <<< "$VERSION_RAW"
          V1="${V1:-0}"
          V2="${V2:-0}"
          V3="${V3:-0}"
          VERSION_3="${V1}.${V2}.${V3}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION_3" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/**/*
